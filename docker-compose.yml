services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      # Cùng cổng với Vite dev → cùng origin, localStorage (lịch sử chat) dùng chung
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
